# GitHub Pages への静的サイトデプロイ用ワークフロー
# サイト本体（index.html / css / js / data / manifest / sw / icons）のみを配信し、
# 開発用ファイル（CLAUDE.md・AGENTS.md・README.md・tools/・tests/・package.json・
# quiz-game-maker.skill）は _site/ にコピーしないため公開されない。
name: Deploy static content to Pages

on:
  # デフォルトブランチへの push で実行
  push:
    branches: ["main"]

  # Actions タブから手動実行もできるようにする
  workflow_dispatch:

# GITHUB_TOKEN が Pages へデプロイできるようにする権限
permissions:
  contents: read
  pages: write
  id-token: write

# 同時デプロイは1つまで。実行中のキューを待たせるだけで、進行中のデプロイはキャンセルしない
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # デプロイ前にテストを通す。テストが失敗したらこの後のステージング・デプロイは実行されない（デプロイゲート）
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      # 依存ゼロのため npm install は不要。node:test のみで検証する
      - name: Run tests
        run: node --test tests/*.test.js

      # 公開対象のファイルだけを _site/ にステージングする
      - name: Stage site files
        run: |
          mkdir _site
          cp index.html manifest.webmanifest sw.js _site/
          cp -r css js data icons _site/

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '_site'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
